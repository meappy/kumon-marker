# Default values for kumon-marker

replicaCount: 1

# Use an existing K8s secret (e.g. "kumon-marker-secrets" created manually)
# When set, Helm will NOT create a Secret — it reads from this one instead
existingSecret: ""

# Inline secrets — used when existingSecret is empty
# These can be supplied via a separate values file (e.g. from a secrets repo)
secrets:
  anthropicApiKey: ""
  geminiApiKey: ""
  openaiApiKey: ""
  googleClientId: ""
  googleClientSecret: ""
  sessionSecret: ""
  rabbitmqPassword: ""
  postgresqlPassword: ""

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kumon.localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  # Keep the PVC when helm release is deleted (prevents data loss)
  keepOnDelete: true

config:
  # Vision provider for worksheet marking: "ollama", "anthropic", "gemini", "openai"
  visionProvider: "ollama"

  # Validation method for checking if PDF is a Kumon worksheet:
  # "ocr" = Tesseract OCR (fast, free, no API cost)
  # "llm" = Vision provider (more robust for scanned PDFs, uses API)
  validationMethod: "ocr"

  # Provider for LLM-based validation (empty = use same as visionProvider)
  validationProvider: ""

  # Worksheet analysis settings
  worksheet:
    questionsPerPage: 10
    # Custom prompt template (uses {sheet_id}, {page_num}, {questions_per_page} placeholders)
    customPrompt: ""

  # Provider configurations
  ollama:
    baseUrl: "http://host.docker.internal:11434"
    model: "moondream"

  anthropic:
    # API key or OAuth session token (sk-ant-oat01-... for OAuth)
    apiKey: ""
    model: "claude-sonnet-4-20250514"

  gemini:
    apiKey: ""
    model: "gemini-2.0-flash"

  openai:
    apiKey: ""
    model: "gpt-4o"

  google:
    clientId: ""
    clientSecret: ""

  googleDrive:
    folder: "From_BrotherDevice"

  # Job queue settings
  jobs:
    maxConcurrent: 1

  # Multi-user authentication
  auth:
    # List of allowed email addresses (can also be comma-separated string)
    allowedUsers: []
    # Secret for signing session cookies (change in production)
    sessionSecret: ""

# RabbitMQ configuration
rabbitmq:
  enabled: true
  image: rabbitmq:3.13-management-alpine
  port: 5672
  managementPort: 15672
  username: kumon
  password: ""  # Set in values-local.yaml or via --set
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    keepOnDelete: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# PostgreSQL configuration
# When disabled, uses external managed PostgreSQL (host/password in secrets repo)
postgresql:
  enabled: false
  image: postgres:16-alpine
  port: 5432
  database: kumon
  username: kumon
  password: ""  # Set in values-local.yaml or via --set
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    keepOnDelete: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# External database connection — host/credentials set in secrets repo
database:
  host: ""
  port: "25060"
  name: "kumon"
  user: "kumon"
  driver: "postgresql"

# Worker configuration
worker:
  enabled: true
  replicas: 1
  # Allow time for current job to complete during shutdown (default: 15 minutes)
  terminationGracePeriodSeconds: 900
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
