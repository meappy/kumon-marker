apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kumon-marker.fullname" . }}-secrets
  labels:
    {{- include "kumon-marker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.config.claude.credentials }}
  claude-credentials: {{ .Values.config.claude.credentials | quote }}
  {{- end }}
  {{- if .Values.config.anthropic.apiKey }}
  anthropic-api-key: {{ .Values.config.anthropic.apiKey | quote }}
  {{- end }}
  {{- if .Values.config.gemini.apiKey }}
  gemini-api-key: {{ .Values.config.gemini.apiKey | quote }}
  {{- end }}
  {{- if .Values.config.google.clientId }}
  google-client-id: {{ .Values.config.google.clientId | quote }}
  {{- end }}
  {{- if .Values.config.google.clientSecret }}
  google-client-secret: {{ .Values.config.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.auth }}
  {{- if .Values.config.auth.sessionSecret }}
  session-secret: {{ .Values.config.auth.sessionSecret | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.rabbitmq.enabled }}
  rabbitmq-password: {{ .Values.rabbitmq.password | default "guest" | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  postgresql-password: {{ .Values.postgresql.password | default "kumon-secret" | quote }}
  {{- end }}
