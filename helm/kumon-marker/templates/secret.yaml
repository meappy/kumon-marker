{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kumon-marker.fullname" . }}-secrets
  labels:
    {{- include "kumon-marker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.geminiApiKey }}
  gemini-api-key: {{ .Values.secrets.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientId }}
  google-client-id: {{ .Values.secrets.googleClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.googleClientSecret }}
  google-client-secret: {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.sessionSecret }}
  session-secret: {{ .Values.secrets.sessionSecret | quote }}
  {{- end }}
  {{- if .Values.rabbitmq.enabled }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | default "guest" | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  postgresql-password: {{ .Values.secrets.postgresqlPassword | default "kumon-secret" | quote }}
  {{- end }}
{{- end }}
