apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kumon-marker.fullname" . }}
  labels:
    {{- include "kumon-marker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kumon-marker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kumon-marker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            # Vision provider configuration
            - name: VISION_PROVIDER
              value: {{ .Values.config.visionProvider | quote }}
            - name: VALIDATION_METHOD
              value: {{ .Values.config.validationMethod | default "ocr" | quote }}
            {{- if .Values.config.validationProvider }}
            - name: VALIDATION_PROVIDER
              value: {{ .Values.config.validationProvider | quote }}
            {{- end }}
            # Ollama
            - name: OLLAMA_BASE_URL
              value: {{ .Values.config.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.config.ollama.model | quote }}
            # Anthropic
            {{- if .Values.config.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropic.model | quote }}
            # Gemini
            {{- if .Values.config.gemini.apiKey }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: gemini-api-key
                  optional: true
            {{- end }}
            - name: GEMINI_MODEL
              value: {{ .Values.config.gemini.model | quote }}
            # OpenAI
            {{- if .Values.config.openai }}
            {{- if .Values.config.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: openai-api-key
                  optional: true
            {{- end }}
            - name: OPENAI_MODEL
              value: {{ .Values.config.openai.model | default "gpt-4o" | quote }}
            {{- end }}
            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: google-client-id
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: google-client-secret
                  optional: true
            - name: GDRIVE_FOLDER
              value: {{ .Values.config.googleDrive.folder | quote }}
            # Worksheet settings
            - name: QUESTIONS_PER_PAGE
              value: {{ .Values.config.worksheet.questionsPerPage | quote }}
            {{- if .Values.config.worksheet.customPrompt }}
            - name: CUSTOM_PROMPT
              value: {{ .Values.config.worksheet.customPrompt | quote }}
            {{- end }}
            - name: DATA_DIR
              value: /app/data
            - name: MAX_CONCURRENT_JOBS
              value: {{ .Values.config.jobs.maxConcurrent | default 1 | quote }}
            {{- if .Values.rabbitmq.enabled }}
            # RabbitMQ connection
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: rabbitmq-password
                  optional: true
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.username }}:$(RABBITMQ_PASSWORD)@{{ include "kumon-marker.fullname" . }}-rabbitmq:{{ .Values.rabbitmq.port }}/"
            {{- end }}
            # PostgreSQL connection
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: postgresql-password
                  optional: true
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.username }}:$(POSTGRESQL_PASSWORD)@{{ include "kumon-marker.fullname" . }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            {{- else if .Values.database }}
            - name: DATABASE_URL
              value: "{{ .Values.database.driver | default "postgresql" }}://{{ .Values.database.user }}:$(POSTGRESQL_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?sslmode=require"
            {{- if .Values.database.poolSize }}
            - name: DB_POOL_SIZE
              value: {{ .Values.database.poolSize | quote }}
            {{- end }}
            {{- if .Values.database.maxOverflow }}
            - name: DB_MAX_OVERFLOW
              value: {{ .Values.database.maxOverflow | quote }}
            {{- end }}
            {{- if .Values.database.poolRecycle }}
            - name: DB_POOL_RECYCLE
              value: {{ .Values.database.poolRecycle | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.auth }}
            {{- if .Values.config.auth.allowedUsers }}
            - name: ALLOWED_USERS
              {{- if kindIs "slice" .Values.config.auth.allowedUsers }}
              value: {{ join "," .Values.config.auth.allowedUsers | quote }}
              {{- else }}
              value: {{ .Values.config.auth.allowedUsers | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.config.auth.sessionSecret }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: session-secret
                  optional: true
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kumon-marker.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
