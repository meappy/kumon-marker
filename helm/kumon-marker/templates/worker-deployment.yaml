{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kumon-marker.fullname" . }}-worker
  labels:
    {{- include "kumon-marker.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "kumon-marker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "kumon-marker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      # Allow up to 15 minutes for graceful shutdown to let current job complete
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds | default 900 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and (eq .Values.config.claude.mode "cli") .Values.config.claude.credentials }}
      initContainers:
        - name: setup-claude-credentials
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /claude-home/.claude
              echo "$CLAUDE_CREDENTIALS" > /claude-home/.claude/.credentials.json
              chmod 600 /claude-home/.claude/.credentials.json
          env:
            - name: CLAUDE_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: claude-credentials
          volumeMounts:
            - name: claude-home
              mountPath: /claude-home
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.worker"]
          env:
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            # Claude/LLM configuration
            - name: CLAUDE_MODE
              value: {{ .Values.config.claude.mode | quote }}
            - name: CLAUDE_MODEL
              value: {{ .Values.config.claude.model | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.config.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.config.ollama.model | quote }}
            {{- if .Values.config.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropic.model | quote }}
            {{- if .Values.config.gemini.apiKey }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: gemini-api-key
                  optional: true
            {{- end }}
            - name: GEMINI_MODEL
              value: {{ .Values.config.gemini.model | quote }}
            # Worksheet settings
            - name: QUESTIONS_PER_PAGE
              value: {{ .Values.config.worksheet.questionsPerPage | quote }}
            {{- if .Values.config.worksheet.customPrompt }}
            - name: CUSTOM_PROMPT
              value: {{ .Values.config.worksheet.customPrompt | quote }}
            {{- end }}
            # Data directory
            - name: DATA_DIR
              value: /app/data
            # RabbitMQ connection - password must be defined before URL for substitution
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: rabbitmq-password
                  optional: true
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.username }}:$(RABBITMQ_PASSWORD)@{{ include "kumon-marker.fullname" . }}-rabbitmq:{{ .Values.rabbitmq.port }}/"
            # PostgreSQL connection - password must be defined before URL for substitution
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: postgresql-password
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.username }}:$(POSTGRESQL_PASSWORD)@{{ include "kumon-marker.fullname" . }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            {{- if and (eq .Values.config.claude.mode "cli") .Values.config.claude.credentials }}
            - name: HOME
              value: /claude-home
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            {{- if and (eq .Values.config.claude.mode "cli") .Values.config.claude.credentials }}
            - name: claude-home
              mountPath: /claude-home
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kumon-marker.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if and (eq .Values.config.claude.mode "cli") .Values.config.claude.credentials }}
        - name: claude-home
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
