{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kumon-marker.fullname" . }}-worker
  labels:
    {{- include "kumon-marker.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "kumon-marker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "kumon-marker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      # Allow up to 15 minutes for graceful shutdown to let current job complete
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds | default 900 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.worker"]
          env:
            - name: APP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            # Vision provider configuration
            - name: VISION_PROVIDER
              value: {{ .Values.config.visionProvider | quote }}
            - name: VALIDATION_METHOD
              value: {{ .Values.config.validationMethod | default "ocr" | quote }}
            {{- if .Values.config.validationProvider }}
            - name: VALIDATION_PROVIDER
              value: {{ .Values.config.validationProvider | quote }}
            {{- end }}
            # Ollama
            - name: OLLAMA_BASE_URL
              value: {{ .Values.config.ollama.baseUrl | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.config.ollama.model | quote }}
            # Anthropic
            {{- if .Values.config.anthropic.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: anthropic-api-key
                  optional: true
            {{- end }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropic.model | quote }}
            # Gemini
            {{- if .Values.config.gemini.apiKey }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: gemini-api-key
                  optional: true
            {{- end }}
            - name: GEMINI_MODEL
              value: {{ .Values.config.gemini.model | quote }}
            # OpenAI
            {{- if .Values.config.openai }}
            {{- if .Values.config.openai.apiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: openai-api-key
                  optional: true
            {{- end }}
            - name: OPENAI_MODEL
              value: {{ .Values.config.openai.model | default "gpt-4o" | quote }}
            {{- end }}
            # Worksheet settings
            - name: QUESTIONS_PER_PAGE
              value: {{ .Values.config.worksheet.questionsPerPage | quote }}
            {{- if .Values.config.worksheet.customPrompt }}
            - name: CUSTOM_PROMPT
              value: {{ .Values.config.worksheet.customPrompt | quote }}
            {{- end }}
            # Data directory
            - name: DATA_DIR
              value: /app/data
            # RabbitMQ connection
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: rabbitmq-password
                  optional: true
            - name: RABBITMQ_URL
              value: "amqp://{{ .Values.rabbitmq.username }}:$(RABBITMQ_PASSWORD)@{{ include "kumon-marker.fullname" . }}-rabbitmq:{{ .Values.rabbitmq.port }}/"
            # PostgreSQL connection
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kumon-marker.secretName" . }}
                  key: postgresql-password
                  optional: true
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.username }}:$(POSTGRESQL_PASSWORD)@{{ include "kumon-marker.fullname" . }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            {{- else if .Values.database }}
            - name: DATABASE_URL
              value: "{{ .Values.database.driver | default "postgresql" }}://{{ .Values.database.user }}:$(POSTGRESQL_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kumon-marker.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
