# Production values for Argo CD deployment
# This file is tracked in git - NO SECRETS HERE
# Secrets are supplied by the kumon-marker-secrets repo via ArgoCD multi-source

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: "fix-sync-dev-17a44a8"  # Updated automatically by CI/CD
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: NodePort
  port: 8000
  nodePort: 30080

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  limits:
    cpu: 1000m
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 2Gi

config:
  visionProvider: "anthropic"
  validationMethod: "llm"

  worksheet:
    questionsPerPage: 10
    customPrompt: ""

  ollama:
    baseUrl: "http://10.1.1.236:11434"
    model: "llava:7b"

  anthropic:
    apiKey: true  # Actual key supplied by kumon-marker-secrets repo
    model: "claude-sonnet-4-20250514"

  gemini:
    model: "gemini-2.0-flash"

  openai:
    model: "gpt-4o"

  googleDrive:
    folder: "From_BrotherDevice"

  auth:
    allowedUsers:
      - "meappy@gmail.com"
      - "gerald@meappy.com"
      - "christopher.xj.wong@gmail.com"

# RabbitMQ configuration
rabbitmq:
  enabled: true
  # password supplied by kumon-marker-secrets repo

# PostgreSQL configuration
postgresql:
  enabled: true
  # password supplied by kumon-marker-secrets repo

# Worker configuration
worker:
  enabled: true
  replicas: 1
