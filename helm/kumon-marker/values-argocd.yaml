# Production values for Argo CD deployment
# This file is tracked in git - NO SECRETS HERE
# Secrets are supplied by the private secrets repo via ArgoCD multi-source

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: "1.1.0"  # Updated automatically by CI/CD
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: NodePort
  port: 8000
  nodePort: 30080

ingress:
  enabled: true
  # host and className supplied by private secrets repo

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

config:
  visionProvider: "anthropic"
  validationMethod: "llm"

  worksheet:
    questionsPerPage: 10
    customPrompt: ""

  ollama:
    # baseUrl supplied by private secrets repo
    model: "llava:7b"

  anthropic:
    apiKey: true  # Actual key supplied by private secrets repo
    model: "claude-opus-4-6"

  gemini:
    model: "gemini-2.0-flash"

  openai:
    model: "gpt-4o"

  googleDrive:
    folder: "From_BrotherDevice"

  auth:
    allowedUsers: []  # Supplied by private secrets repo

# RabbitMQ configuration
rabbitmq:
  enabled: true
  # password supplied by private secrets repo

# PostgreSQL configuration
postgresql:
  enabled: true
  # password supplied by private secrets repo

# Worker configuration
worker:
  enabled: true
  replicas: 1
