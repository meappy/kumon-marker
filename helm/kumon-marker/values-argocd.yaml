# Production values for Argo CD deployment
# This file is tracked in git - NO SECRETS HERE
# Secrets are stored in Kubernetes Secret: kumon-marker-secrets

# Use existing K8s secret instead of creating from values
existingSecret: "kumon-marker-secrets"

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: "fix-sync-dev-17a44a8"  # Updated automatically by CI/CD
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: NodePort
  port: 8000
  nodePort: 30080

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  limits:
    cpu: 1000m
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 2Gi

config:
  visionProvider: "anthropic"
  validationMethod: "ocr"

  worksheet:
    questionsPerPage: 10
    customPrompt: ""

  ollama:
    baseUrl: "http://10.1.1.236:11434"
    model: "llava:7b"

  anthropic:
    apiKey: true  # Read from existingSecret (key: anthropic-api-key)
    model: "claude-sonnet-4-20250514"

  gemini:
    model: "gemini-2.0-flash"

  openai:
    model: "gpt-4o"

  googleDrive:
    folder: "From_BrotherDevice"

  auth:
    allowedUsers:
      - "meappy@gmail.com"
      - "gerald@meappy.com"
      - "christopher.xj.wong@gmail.com"

# RabbitMQ configuration
rabbitmq:
  enabled: true
  # password loaded from existingSecret

# PostgreSQL configuration
postgresql:
  enabled: true
  # password loaded from existingSecret

# Worker configuration
worker:
  enabled: true
  replicas: 1
