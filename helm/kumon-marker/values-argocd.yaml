# Production values for Argo CD deployment
# This file is tracked in git - NO SECRETS HERE
# Secrets are stored in Kubernetes Secret: kumon-marker-secrets

# Use existing K8s secret instead of creating from values
existingSecret: "kumon-marker-secrets"

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: "0.4.7"  # Updated automatically by CI/CD
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: NodePort
  port: 8000
  nodePort: 30080

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  limits:
    cpu: 1000m
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 2Gi

config:
  claude:
    mode: "cli"
    model: "claude-sonnet-4-20250514"
    # credentials loaded from existingSecret
  worksheet:
    questionsPerPage: 10
    customPrompt: ""
  ollama:
    baseUrl: "http://10.1.1.236:11434"
    model: "llava:7b"
  anthropic:
    model: "claude-haiku-3-5-20241022"
  gemini:
    model: "gemini-2.0-flash"
  googleDrive:
    folder: "From_BrotherDevice"
  auth:
    allowedUsers:
      - "meappy@gmail.com"
      - "gerald@meappy.com"

# RabbitMQ configuration
rabbitmq:
  enabled: true
  # password loaded from existingSecret

# PostgreSQL configuration
postgresql:
  enabled: true
  # password loaded from existingSecret

# Worker configuration
worker:
  enabled: true
  replicas: 1
