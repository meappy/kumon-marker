# Production values for Argo CD deployment
# This file is tracked in git - NO SECRETS HERE
# Secrets are supplied by the private secrets repo via ArgoCD multi-source

image:
  repository: ghcr.io/meappy/kumon-marker
  tag: "1.7.6"  # Updated automatically by CI/CD
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  # host and className supplied by private secrets repo

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

config:
  visionProvider: "anthropic"
  validationMethod: "llm"

  worksheet:
    questionsPerPage: 10
    customPrompt: ""

  ollama:
    # baseUrl supplied by private secrets repo
    model: "llava:7b"

  anthropic:
    apiKey: true  # Actual key supplied by private secrets repo
    model: "claude-opus-4-6"

  gemini:
    model: "gemini-2.0-flash"

  openai:
    model: "gpt-4o"

  googleDrive:
    folder: "From_BrotherDevice"

  auth:
    allowedUsers: []  # Supplied by private secrets repo

# RabbitMQ configuration
rabbitmq:
  enabled: true
  # password supplied by private secrets repo

# PostgreSQL — disabled, using DO Managed PostgreSQL
postgresql:
  enabled: false

# Worker configuration
worker:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
