apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kumon-marker
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - branch: main
            branchSafe: main
          - branch: dev
            branchSafe: dev
  template:
    metadata:
      name: 'kumon-marker-{{ .branchSafe }}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # Main chart from kumon-marker (public)
        - repoURL: https://github.com/meappy/kumon-marker.git
          targetRevision: '{{ .branch }}'
          path: helm/kumon-marker
          helm:
            releaseName: kumon-marker
            valueFiles:
              - values.yaml
              - values-argocd.yaml
              - "$secrets/kumon-marker/values-secrets.yaml"
        # Secrets from kumon-marker-secrets (private)
        - repoURL: https://github.com/meappy/kumon-marker-secrets.git
          targetRevision: main
          ref: secrets
      destination:
        server: https://kubernetes.default.svc
        namespace: kumon-marker
      syncPolicy:
        # Webhook-only: no automated polling (saves GitHub API rate limit)
        # Manual sync or webhook triggers required
        syncOptions:
          - CreateNamespace=true
