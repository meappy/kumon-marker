# This is a template. The actual applicationset with real repo URLs
# is stored in the private secrets repo and applied to the cluster directly.
#
# To use: copy this template, fill in the repoURL values, and apply:
#   kubectl apply -f applicationset.yaml -n argocd
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kumon-marker
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - branch: main
            branchSafe: main
          - branch: dev
            branchSafe: dev
  template:
    metadata:
      name: 'kumon-marker-{{ .branchSafe }}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://github.com/OWNER/kumon-marker.git
          targetRevision: '{{ .branch }}'
          path: helm/kumon-marker
          helm:
            releaseName: kumon-marker
            valueFiles:
              - values.yaml
              - values-argocd.yaml
              - "$secrets/kumon-marker/values-secrets.yaml"
        - repoURL: https://github.com/OWNER/SECRETS-REPO.git
          targetRevision: main
          ref: secrets
      destination:
        server: https://kubernetes.default.svc
        namespace: kumon-marker
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
