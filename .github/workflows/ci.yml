name: CI

on:
  push:
    branches:
      - 'fix/**'
      - 'feat/**'
      - 'feature/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kumon-marker

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install ruff

      - name: Run ruff
        run: |
          cd backend
          ruff check .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kumon-marker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build, push, and merge to dev for Argo CD deployment
  build-and-deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get branch info
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          TAG="${SAFE_BRANCH}-${SHORT_SHA}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Source branch: $BRANCH"
          echo "Image tag: $TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get latest version from main branch
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || echo "0.4.0")
          echo "Using version from main: $MAIN_VERSION"

          # Update Chart.yaml with version from main
          sed -i "s|^version: .*|version: $MAIN_VERSION|" helm/kumon-marker/Chart.yaml
          sed -i "s|^appVersion: .*|appVersion: \"$MAIN_VERSION\"|" helm/kumon-marker/Chart.yaml

          # Update image tag in values-argocd.yaml
          sed -i 's|tag: ".*"|tag: "${{ steps.branch.outputs.tag }}"|' helm/kumon-marker/values-argocd.yaml

          git add helm/kumon-marker/Chart.yaml helm/kumon-marker/values-argocd.yaml
          git commit -m "chore: set image tag to ${{ steps.branch.outputs.tag }}, version $MAIN_VERSION [skip ci]"

          # Force push feature branch as dev (no merge conflicts)
          git push origin HEAD:dev --force

      - name: Print deployment info
        run: |
          echo "=========================================="
          echo "Deployed to dev!"
          echo "=========================================="
          echo ""
          echo "Branch: ${{ steps.branch.outputs.name }} → merged to dev"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}"
          echo ""
          echo "Argo CD will automatically sync kumon-marker-dev"
          echo ""
