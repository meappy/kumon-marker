name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kumon-marker

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install ruff

      - name: Run ruff
        run: |
          cd backend
          ruff check .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kumon-marker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build, push, and prepare branch for Argo CD deployment
  build-branch:
    name: Build & Deploy Branch
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch info
        id: branch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)
          TAG="branch-$SAFE_BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_BRANCH" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH, Tag: $TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push branch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update values-argocd.yaml in branch
        run: |
          TAG="${{ steps.branch.outputs.tag }}"
          sed -i "s|tag: \".*\"|tag: \"$TAG\"|" helm/kumon-marker/values-argocd.yaml
          echo "Updated values-argocd.yaml to tag: $TAG"
          grep "tag:" helm/kumon-marker/values-argocd.yaml

      - name: Commit and push to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/kumon-marker/values-argocd.yaml
          git diff --cached --quiet || git commit -m "chore: set image tag to ${{ steps.branch.outputs.tag }} [skip ci]"
          git push origin ${{ steps.branch.outputs.name }}

      - name: Print deployment info
        run: |
          echo "=========================================="
          echo "Branch deployed automatically!"
          echo "=========================================="
          echo ""
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}"
          echo ""
          echo "Argo CD ApplicationSet will automatically deploy to:"
          echo "  Namespace: kumon-marker-${{ steps.branch.outputs.safe_name }}"
          echo "  Application: kumon-marker-${{ steps.branch.outputs.safe_name }}"
          echo ""
          echo "Check deployment status:"
          echo "  kubectl get application -n argocd kumon-marker-${{ steps.branch.outputs.safe_name }}"
          echo ""
          echo "When you delete this branch, the deployment is automatically cleaned up."
          echo ""
